# Full April 2026 browser-download job.
# Default mode reproduces the successful manual DataWeb flow and does not split by HTS2.
year: 2026
months: [4]

flows:
  - import_general
  - import_consumption
  - export_total
  - export_domestic
  - export_foreign
  - trade_balance

# Use "all" to download every DataWeb measure for that trade flow.
measures:
  import_general: all
  import_consumption: all
  export_total: all
  export_domestic: all
  export_foreign: all
  trade_balance: all

split:
  strategy: none
  hts2_chapters: []

directories:
  downloads: downloads
  payloads: output/payloads
  logs: logs

runtime:
  dry_run: false
  skip_existing: true
  timeout_seconds: 60
  download_timeout_seconds: 360
  headless: false
  retries: 8
  retry_sleep_seconds: 30
  form_settle_seconds: 5
  task_sleep_seconds: 60
  restart_browser_on_error: true
  browser_cooldown_seconds: 60
  row_warning_threshold: 300000
  save_payloads: false
