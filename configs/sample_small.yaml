# Small smoke test: one month, one flow, one measure, full HTS-10 download.
year: 2026
months: [4]
flows: [import_general]

measures:
  import_general: [CIF]

split:
  strategy: none
  hts2_chapters: []

directories:
  downloads: downloads
  payloads: output/payloads
  logs: logs

runtime:
  dry_run: false
  skip_existing: true
  timeout_seconds: 60
  download_timeout_seconds: 360
  headless: false
  retries: 8
  retry_sleep_seconds: 30
  form_settle_seconds: 2
  task_sleep_seconds: 0
  restart_browser_on_error: true
  browser_cooldown_seconds: 60
  row_warning_threshold: 300000
  save_payloads: false
