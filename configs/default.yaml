# Full April 2026 job. By default this splits each request by HTS2 chapter
# because all countries x all HTS10 can exceed DataWeb's practical row limit.
year: 2026
months: [4]

flows:
  - import_general
  - import_consumption
  - export_total
  - export_domestic
  - export_foreign
  - trade_balance

# Use "all" to download every DataWeb measure for that trade flow.
measures:
  import_general: all
  import_consumption: all
  export_total: all
  export_domestic: all
  export_foreign: all
  trade_balance: all

split:
  strategy: hts2
  # HTS chapters 01-99. Narrow this list for testing, for example: ["01", "02"].
