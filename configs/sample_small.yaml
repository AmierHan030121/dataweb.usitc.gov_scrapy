# Small smoke test: one month, one flow, one measure, one HTS2 chapter.
year: 2026
months: [4]
flows: [import_general]

measures:
  import_general: [CIF]

split:
  strategy: hts2
  hts2_chapters: ["01"]

directories:
  downloads: downloads
  payloads: output/payloads
  logs: logs

runtime:
  dry_run: false
  skip_existing: true
  timeout_seconds: 600
  retries: 2
  retry_sleep_seconds: 60
  row_warning_threshold: 300000
  save_payloads: true
